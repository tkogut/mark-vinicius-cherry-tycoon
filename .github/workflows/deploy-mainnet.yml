name: Deploy to ICP Mainnet

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm mainnet deployment'
        required: true
        type: string

jobs:
  deploy-mainnet:
    runs-on: ubuntu-latest
    name: Deploy to Mainnet (EOP)
    if: github.event.inputs.confirm == 'deploy'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install DFX (latest)
        uses: dfinity/setup-dfx@main
        with:
          dfx-version: '0.30.2'

      - name: Import Deploy Identity
        env:
          DFX_IDENTITY: ${{ secrets.DFX_IDENTITY_PEM }}
        run: |
          mkdir -p ~/.config/dfx/identity/deploy
          echo "$DFX_IDENTITY" > ~/.config/dfx/identity/deploy/identity.pem
          dfx identity use deploy
          dfx identity get-principal

      - name: Deploy Backend to Mainnet
        run: |
          dfx deploy backend_mainnet --network ic --yes

          # Export ID for frontend build
          BACKEND_ID=$(dfx canister --network ic id backend_mainnet)
          echo "VITE_BACKEND_CANISTER_ID=$BACKEND_ID" >> $GITHUB_ENV
          echo "Backend ID: $BACKEND_ID"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend Assets
        working-directory: frontend
        env:
          VITE_BACKEND_CANISTER_ID: ${{ env.VITE_BACKEND_CANISTER_ID }}
          VITE_DFX_NETWORK: ic
        run: npm run build

      - name: Deploy Frontend to Mainnet
        run: |
          dfx deploy frontend --network ic --yes

          echo "✅ Mainnet deployment complete"
          if [ -f .dfx/ic/canister_ids.json ]; then
            echo "Canister IDs:"
            cat .dfx/ic/canister_ids.json
          fi
