name: Deploy to ICP Playground

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy-playground:
    runs-on: ubuntu-latest
    name: Deploy to Playground
    env:
      DFX_IDENTITY_PEM: ${{ secrets.DFX_IDENTITY_PEM }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install DFX
        uses: aviate-labs/setup-dfx@v0.3.2
        with:
          dfx-version: '0.24.3'
          install-moc: true

      - name: Import Deploy Identity
        if: ${{ env.DFX_IDENTITY_PEM != '' }}
        run: |
          mkdir -p ~/.config/dfx/identity/deploy
          echo "${{ env.DFX_IDENTITY_PEM }}" > ~/.config/dfx/identity/deploy/identity.pem
          dfx identity use deploy
          dfx identity get-principal

      - name: Deploy Backend to Playground
        run: |
          unset CI
          unset GITHUB_ACTIONS
          dfx deploy backend --network playground --yes

      - name: Export Backend ID
        run: |
          BACKEND_ID=$(dfx canister --network playground id backend)
          echo "VITE_BACKEND_CANISTER_ID=$BACKEND_ID" >> $GITHUB_ENV
          echo "Backend ID: $BACKEND_ID"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend Assets
        working-directory: frontend
        env:
          CANISTER_ID_BACKEND: ${{ env.VITE_BACKEND_CANISTER_ID }}
          DFX_NETWORK: playground
        run: npm run build

      - name: Deploy Frontend to Playground
        run: |
          unset CI
          unset GITHUB_ACTIONS
          dfx deploy frontend --network playground --yes
          
          echo "✅ Deployment complete"
          if [ -f .dfx/playground/canister_ids.json ]; then
            echo "Canister IDs:"
            cat .dfx/playground/canister_ids.json
          fi

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playground-deploy-logs
          path: |
            .tmp/*.log
            frontend/npm-debug.log
            *.log

